name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build backend
      run: |
        cd backend
        npm run build

    - name: Run backend tests
      run: |
        cd backend
        npm test -- --coverage
      env:
        NODE_ENV: test
        MONGODB_URI: mongodb://localhost:27017/pet-ecommerce-test
        JWT_SECRET: test-jwt-secret-key-minimum-32-characters-long-for-testing

    - name: Build frontend
      run: |
        cd frontend
        npm run build

    - name: Build admin
      run: |
        cd admin
        npm run build

    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        files: ./backend/coverage/lcov.info
        flags: backend
        name: backend-coverage

  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Check TypeScript (Backend)
      run: |
        cd backend
        npm run build

    - name: Check TypeScript (Frontend)
      run: |
        cd frontend
        npm run build

    - name: Check TypeScript (Admin)
      run: |
        cd admin
        npm run build

