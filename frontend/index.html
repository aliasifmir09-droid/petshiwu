    <!--Start of Tawk.to Script - Lazy Loaded for Performance-->
    <script type="text/javascript">
    // Lazy load Tawk.to after page load to improve initial page performance
    function loadTawk() {
      if (window.Tawk_API && window.Tawk_API.isLoaded) {
        return; // Already loaded
      }
      var Tawk_API=Tawk_API||{}, Tawk_LoadStart=new Date();
      (function(){
        var s1=document.createElement("script"),s0=document.getElementsByTagName("script")[0];
        s1.async=true;
        s1.src='https://embed.tawk.to/6921e5eced8113195e016894/1jam6k9ak';
        s1.charset='UTF-8';
        // Add error handling for CORS or network failures
        s1.onerror = function() {
          console.warn('Tawk.to chat widget failed to load. This is non-critical and the site will continue to function normally.');
          // Clean up the failed script element
          if (s1.parentNode) {
            s1.parentNode.removeChild(s1);
          }
        };
        s0.parentNode.insertBefore(s1,s0);
      })();
    }
    
    // Load Tawk.to after page is fully loaded (not blocking initial render)
    if (document.readyState === 'complete') {
      // Page already loaded, load immediately
      setTimeout(loadTawk, 2000); // Wait 2 seconds after page load
    } else {
      // Wait for page to load
      window.addEventListener('load', function() {
        setTimeout(loadTawk, 2000); // Wait 2 seconds after page load
      });
    }
    
    // Also load on user interaction (scroll, click, etc.) for faster activation
    var tawkLoaded = false;
    function loadTawkOnInteraction() {
      if (!tawkLoaded) {
        tawkLoaded = true;
        loadTawk();
        // Remove listeners after first interaction
        window.removeEventListener('scroll', loadTawkOnInteraction, { passive: true });
        window.removeEventListener('click', loadTawkOnInteraction);
        window.removeEventListener('touchstart', loadTawkOnInteraction, { passive: true });
      }
    }
    window.addEventListener('scroll', loadTawkOnInteraction, { passive: true });
    window.addEventListener('click', loadTawkOnInteraction);
    window.addEventListener('touchstart', loadTawkOnInteraction, { passive: true });
    </script>
    <!--End of Tawk.to Script-->
