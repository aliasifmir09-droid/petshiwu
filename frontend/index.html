<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/logo.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/logo.png" />
    <link rel="shortcut icon" href="/logo.png" />

    <meta name="theme-color" content="#1E3A8A" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- PERFORMANCE FIX: Inline critical CSS for faster FCP -->
    <style>
      *{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Roboto','Oxygen','Ubuntu','Cantarell','Fira Sans','Droid Sans','Helvetica Neue',sans-serif;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;background:linear-gradient(to bottom,#fff 0%,#f9fafb 100%);font-display:optional}header{background:#fff;box-shadow:0 2px 4px rgba(0,0,0,.1)}.loading-spinner{display:flex;align-items:center;justify-content:center;min-height:200px}img{max-width:100%;height:auto}button{cursor:pointer;border:none;background:none}
    </style>
    <!-- Critical: Preload LCP image (logo) for fastest rendering -->
    <link rel="preload" as="image" href="/logo.avif" type="image/avif" fetchpriority="high" />
    <link rel="preload" as="image" href="/logo.webp" type="image/webp" fetchpriority="high" />
    <link rel="preload" as="image" href="/logo.png" type="image/png" fetchpriority="high" />
    <!-- Critical: Preconnect to backend API FIRST (most important for LCP) -->
    <link rel="dns-prefetch" href="https://pet-shop-backend-totp.onrender.com">
    <link rel="preconnect" href="https://pet-shop-backend-totp.onrender.com" crossorigin>
    <!-- Prefetch slideshow API endpoint for faster LCP image discovery -->
    <link rel="dns-prefetch" href="https://pet-shop-backend-totp.onrender.com/api/slideshow">
    <!-- Preconnect to image CDNs for faster image loading (critical for LCP) -->
    <link rel="dns-prefetch" href="https://res.cloudinary.com">
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin>
    <link rel="dns-prefetch" href="https://s7d2.scene7.com">
    <link rel="preconnect" href="https://s7d2.scene7.com" crossorigin>
    <!-- PERFORMANCE FIX: Preconnect for fonts (critical for font loading) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- PERFORMANCE FIX: Prefetch likely next pages -->
    <link rel="prefetch" href="/products">
    <link rel="prefetch" href="/category">
    <!-- Preconnect for Tawk.to (lazy loaded, low priority) -->
    <link rel="dns-prefetch" href="https://embed.tawk.to">
    <!-- PERFORMANCE FIX: Defer non-critical font loading -->
    <link 
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Poppins:wght@400;600;700&display=swap" 
      rel="stylesheet"
      media="print"
      onload="this.media='all';this.onload=null"
    >
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    </noscript>
    <!-- PERFORMANCE FIX: Preload critical fonts -->
    <link rel="preload" href="https://fonts.gstatic.com/s/nunito/v26/XRXI3I6Li01BKofAjsOUYevI.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="https://fonts.gstatic.com/s/poppins/v21/pxiEyp8kv8JHgFVrJJfecg.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1E3A8A" />
    <title>petshiwu - Everything Your Pet Needs</title>
    <meta name="description" content="Shop premium pet food, toys, and supplies for dogs, cats, and more at petshiwu. Fast shipping and great prices!">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!--Start of Tawk.to Script - Lazy Loaded for Performance-->
    <script type="text/javascript">
    // Lazy load Tawk.to after page load to improve initial page performance
    function loadTawk() {
      if (window.Tawk_API && window.Tawk_API.isLoaded) {
        return; // Already loaded
      }
      var Tawk_API=Tawk_API||{}, Tawk_LoadStart=new Date();
      (function(){
        var s1=document.createElement("script"),s0=document.getElementsByTagName("script")[0];
        s1.async=true;
        s1.src='https://embed.tawk.to/6921e5eced8113195e016894/1jam6k9ak';
        s1.charset='UTF-8';
        // Add error handling for CORS or network failures
        s1.onerror = function() {
          console.warn('Tawk.to chat widget failed to load. This is non-critical and the site will continue to function normally.');
          // Clean up the failed script element
          if (s1.parentNode) {
            s1.parentNode.removeChild(s1);
          }
        };
        s0.parentNode.insertBefore(s1,s0);
      })();
    }
    
    // Load Tawk.to after page is fully loaded (not blocking initial render)
    if (document.readyState === 'complete') {
      // Page already loaded, load immediately
      setTimeout(loadTawk, 2000); // Wait 2 seconds after page load
    } else {
      // Wait for page to load
      window.addEventListener('load', function() {
        setTimeout(loadTawk, 2000); // Wait 2 seconds after page load
      });
    }
    
    // Also load on user interaction (scroll, click, etc.) for faster activation
    var tawkLoaded = false;
    function loadTawkOnInteraction() {
      if (!tawkLoaded) {
        tawkLoaded = true;
        loadTawk();
        // Remove listeners after first interaction
        window.removeEventListener('scroll', loadTawkOnInteraction, { passive: true });
        window.removeEventListener('click', loadTawkOnInteraction);
        window.removeEventListener('touchstart', loadTawkOnInteraction, { passive: true });
      }
    }
    window.addEventListener('scroll', loadTawkOnInteraction, { passive: true });
    window.addEventListener('click', loadTawkOnInteraction);
    window.addEventListener('touchstart', loadTawkOnInteraction, { passive: true });
    </script>
    <!--End of Tawk.to Script-->
  </body>
</html>
