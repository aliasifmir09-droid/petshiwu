services:
  - type: web
    name: petshiwu
    env: node
    plan: starter
    region: oregon
    buildCommand: cd frontend && npm install --include=dev && npm run build && cd ../backend && npm install && npm run build
    startCommand: cd backend && node dist/server.js
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        value: https://www.petshiwu.com,https://petshiwu.com
      - key: FRONTEND_URL
        value: https://www.petshiwu.com
      - key: VITE_API_URL
        value: https://www.petshiwu.com/api
