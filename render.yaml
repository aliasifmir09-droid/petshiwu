services:
  - type: web
    name: pet-shop-api
    env: node
    rootDir: backend
    plan: free
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        # Update these after your first deploy with actual Render URLs
        value: https://pet-shop-frontend.onrender.com,https://pet-shop-admin.onrender.com

  - type: web
    name: pet-shop-frontend
    env: static
    rootDir: frontend
    plan: free
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        # Update with actual API URL after backend deploy if different
        value: https://pet-shop-api.onrender.com/api

  - type: web
    name: pet-shop-admin
    env: static
    rootDir: admin
    plan: free
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        # Update with actual API URL after backend deploy if different
        value: https://pet-shop-api.onrender.com/api
