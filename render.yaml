jobs:
  - name: petshiwu-migrate-images
    type: job
    env: node
    plan: starter
    region: oregon
    buildCommand: cd backend && npm install
    startCommand: node scripts/migrateImages.mjs
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: BUNNY_STORAGE_PASSWORD
        value: ad8f1a46-6aa8-45fa-b07f8d43fe40-5801-4f31

services:
  - type: web
    name: petshiwu
    env: node
    plan: starter
    region: oregon
    buildCommand: cd admin && npm install --include=dev && npm run build && cd ../frontend && npm install --include=dev && npm run build && cd ../backend && npm install && npm run build
    startCommand: cd backend && node dist/server.js
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        value: https://www.petshiwu.com,https://petshiwu.com,https://dashboard.petshiwu.com
      - key: FRONTEND_URL
        value: https://www.petshiwu.com
      - key: VITE_API_URL
        value: https://www.petshiwu.com/api
